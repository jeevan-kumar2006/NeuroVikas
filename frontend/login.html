<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DIFFERENT IDEA</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-container">
        <div class="brand-panel">
            <div class="brand-content">
                <h1>DIFFERENT IDEA</h1>
                <p>Education designed for every mind.</p>
            </div>
        </div>

        <div class="form-panel">
            <div class="form-wrapper">
                <div class="mobile-logo">DIFFERENT IDEA</div>
                
                <h2>Welcome Back</h2>
                <p class="subtitle">Log in to access your personalized dashboard.</p>

                <form id="login-form">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="name@example.com" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>

                    <div class="options-row">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Log In</button>
                    
                    <div class="divider"><span>or</span></div>

                    <a href="signup.html" class="btn btn-outline btn-full">
                        Create an Account
                    </a>
                    <br>
                    <a href="index.html" class="btn btn-outline btn-full" style="background:#f5f5f5; color:#666; border-color:#ddd;">
                        Continue as Guest
                    </a>
                </form>
            </div>
        </div>
    </div>

<script>
    const getApiUrl = () => {
    // 1. Local VS Code Development
    if (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost') {
        return "http://127.0.0.1:5000";
    }

    // 2. GitHub Codespaces Logic
    // Codespaces creates URLs like: https://verbose-space-xyx-5500.app.github.dev
    // We need to swap the port number in the subdomain.
    if (window.location.hostname.includes('app.github.dev')) {
        // Replace the port part of the subdomain (e.g., -5500) with the backend port (-5000)
        // This assumes your frontend is running on a different port than 5000 (like Live Server on 5500)
        let host = window.location.hostname;
        
        // If running Live Server (port 5500), it will have -5500 in the URL.
        // We replace -5500 (or any port) with -5000.
        // Note: This regex handles the specific format of Codespaces URLs.
        return `https://${host.replace(/-\d+/, '-5000')}`; 
    }

    // 3. Fallback (if deployed normally)
    return window.location.origin;
};
const API_URL = getApiUrl();

    const loginForm = document.getElementById('login-form');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // This can be either email or username
        const login_id = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch(`${API_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: login_id, password: password })
            });

            const data = await response.json();

            if (data.success) {
                localStorage.setItem('currentUser', data.user); // Username
                localStorage.setItem('userEmail', data.email);   // Email
                localStorage.setItem('userStreak', data.streak);
                localStorage.setItem('userTime', data.total_time);
                localStorage.setItem('authToken', data.token);
                
                window.location.href = "dashboard.html";
            } else {
                alert(data.message);
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Server connection error.");
        }
    });
</script>
    
</body>
</html>
