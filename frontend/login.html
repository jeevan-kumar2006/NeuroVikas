<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NeuroVikas</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-container">
        <div class="brand-panel">
            <div class="brand-content">
                <h1>NeuroVikas</h1>
                <p>Education designed for every mind.</p>
            </div>
        </div>

        <div class="form-panel">
            <div class="form-wrapper">
                <div class="mobile-logo">NeuroVikas</div>
                
                <h2>Welcome Back</h2>
                <p class="subtitle">Log in to access your personalized dashboard.</p>

                <form id="login-form">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="name@example.com" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                            <button type="button" class="pwd-toggle" onclick="togglePwd('password', this)" tabindex="-1" aria-label="Show password">
                                <!-- Eye icon (password hidden) -->
                                <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                <!-- Eye-off icon (password visible) -->
                                <svg class="eye-off-icon hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                    <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                    <line x1="1" y1="1" x2="23" y2="23"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="options-row">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Log In</button>
                    
                    <div class="divider"><span>or</span></div>

                    <a href="signup.html" class="btn btn-outline btn-full">
                        Create an Account
                    </a>
                    <br>
                    <a href="index.html" class="btn btn-outline btn-full" style="background:#f5f5f5; color:#666; border-color:#ddd;">
                        Continue as Guest
                    </a>
                </form>
            </div>
        </div>
    </div>

<script>
    const getApiUrl = () => {
    // 1. Local VS Code Development or Direct File Access
    if (window.location.protocol === 'file:' || window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' || window.location.hostname === '') {
        return "http://127.0.0.1:5000";
    }

    // 2. GitHub Codespaces Logic
    if (window.location.hostname.includes('app.github.dev')) {
        let host = window.location.hostname;
        return `https://${host.replace(/-\d+/, '-5000')}`; 
    }

    // 3. Fallback (if deployed normally)
    return window.location.origin;
};
const API_URL = getApiUrl();

    const loginForm = document.getElementById('login-form');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const login_id = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch(`${API_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: login_id, password: password })
            });

            const data = await response.json();

            if (data.success) {
                localStorage.setItem('currentUser', data.user);
                localStorage.setItem('userEmail', data.email);
                localStorage.setItem('userStreak', data.streak);
                localStorage.setItem('userTime', data.total_time);
                localStorage.setItem('authToken', data.token);
                localStorage.setItem('chatHistory', data.chat_history);
                
                window.location.href = "dashboard.html";
            } else {
                alert(data.message);
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Server connection error.");
        }
    });

    function togglePwd(inputId, btn) {
        const input = document.getElementById(inputId);
        const eyeIcon    = btn.querySelector('.eye-icon');
        const eyeOffIcon = btn.querySelector('.eye-off-icon');
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        eyeIcon.classList.toggle('hidden',    isHidden);  // hide eye when showing
        eyeOffIcon.classList.toggle('hidden', !isHidden); // show eye-off when showing
        btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    }
</script>
    
</body>
</html>
