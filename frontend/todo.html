<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks | NeuroVikas</title>

    <!-- Dyslexia-friendly fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/opendyslexic" rel="stylesheet">

    <style>
        /* ────────────────────────────────
           RESET & ROOT
        ──────────────────────────────── */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --font-main:   'Lexend', 'Atkinson Hyperlegible', sans-serif;
            --font-dyslexia: 'OpenDyslexic', 'Lexend', sans-serif;

            --bg:          #f7f3ee;
            --card:        #ffffff;
            --border:      #e0d8ce;
            --ink:         #2c2416;
            --ink-soft:    #5c4f3a;
            --ink-mute:    #9a8c78;

            --accent:      #5b7fa6;    /* calm blue */
            --accent-soft: #dde8f4;

            --done-bg:     #eaf7ef;
            --done-border: #b5dfc4;
            --done-text:   #2d6e4f;

            --red:    #e05252;
            --orange: #e8933a;
            --green:  #48a97a;
            --blue:   #5b7fa6;

            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 2px 12px rgba(44,36,22,0.07), 0 1px 4px rgba(44,36,22,0.04);
        }

        /* ────────────────────────────────
           BODY
        ──────────────────────────────── */
        body {
            font-family: var(--font-main);
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 2.5rem 1rem 5rem;
            line-height: 1.7;
            font-size: 1.08rem;
            letter-spacing: 0.01em;
        }

        body.font-dyslexia {
            font-family: var(--font-dyslexia);
            letter-spacing: 0.05em;
            word-spacing: 0.12em;
            line-height: 1.9;
        }

        /* ────────────────────────────────
           LAYOUT WRAPPER
        ──────────────────────────────── */
        .wrapper {
            max-width: 680px;
            margin: 0 auto;
        }

        /* ────────────────────────────────
           HEADER
        ──────────────────────────────── */
        .page-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .page-header-left h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--ink);
            line-height: 1.15;
            letter-spacing: -0.03em;
        }

        .page-header-left p {
            color: var(--ink-mute);
            font-size: 0.95rem;
            margin-top: 0.3rem;
            font-weight: 400;
        }

        .back-link {
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--ink-mute);
            padding: 0.5rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 30px;
            background: var(--card);
            white-space: nowrap;
            transition: all 0.2s;
        }

        .back-link:hover {
            color: var(--accent);
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        /* ────────────────────────────────
           TOOLBAR (font toggle + filter)
        ──────────────────────────────── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .toolbar-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--ink-mute);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .pill-btn {
            padding: 0.42rem 1rem;
            border-radius: 30px;
            border: 1.5px solid var(--border);
            background: var(--card);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--ink-soft);
            transition: all 0.18s;
        }

        .pill-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-soft);
        }

        .pill-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .divider {
            width: 1px;
            height: 28px;
            background: var(--border);
            margin: 0 0.25rem;
        }

        /* ────────────────────────────────
           ADD TASK CARD
        ──────────────────────────────── */
        .add-card {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 1.4rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }

        .add-card h2 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--ink-soft);
            margin-bottom: 0.9rem;
            letter-spacing: 0.01em;
        }

        .add-row {
            display: flex;
            gap: 0.75rem;
            align-items: stretch;
            flex-wrap: wrap;
        }

        .task-input {
            flex: 1;
            min-width: 200px;
            padding: 0.85rem 1.1rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 1.05rem;
            color: var(--ink);
            background: var(--bg);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .task-input::placeholder { color: var(--ink-mute); }

        .task-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(91,127,166,0.12);
            background: #fff;
        }

        .priority-select {
            padding: 0.85rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--ink-soft);
            background: var(--bg);
            cursor: pointer;
            outline: none;
            appearance: none;
            min-width: 120px;
            transition: border-color 0.2s;
        }

        .priority-select:focus { border-color: var(--accent); }

        .add-btn {
            padding: 0.85rem 1.6rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .add-btn:hover {
            background: #3f6490;
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(91,127,166,0.35);
        }

        .add-btn:active { transform: translateY(0); }

        /* ────────────────────────────────
           PROGRESS BAR
        ──────────────────────────────── */
        .progress-section {
            margin-bottom: 1.5rem;
        }

        .progress-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--ink-mute);
        }

        .progress-bar-track {
            width: 100%;
            height: 10px;
            background: var(--border);
            border-radius: 30px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #48a97a, #5b7fa6);
            border-radius: 30px;
            transition: width 0.5s cubic-bezier(0.22,1,0.36,1);
            width: 0%;
        }

        /* ────────────────────────────────
           TASK LIST
        ──────────────────────────────── */
        .section-title {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--ink-mute);
            font-weight: 700;
            margin: 1.6rem 0 0.7rem;
        }

        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
        }

        /* ────────────────────────────────
           TASK ITEM
        ──────────────────────────────── */
        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 0.9rem;
            background: var(--card);
            border: 1.5px solid var(--border);
            border-left: 5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 1rem 1.1rem;
            box-shadow: var(--shadow);
            transition: all 0.22s cubic-bezier(0.22,1,0.36,1);
            animation: taskIn 0.3s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes taskIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .task-item:hover { transform: translateX(3px); box-shadow: 0 4px 18px rgba(44,36,22,0.10); }

        .task-item.priority-high   { border-left-color: var(--red); }
        .task-item.priority-medium { border-left-color: var(--orange); }
        .task-item.priority-low    { border-left-color: var(--green); }

        .task-item.task-done {
            background: var(--done-bg);
            border-color: var(--done-border);
            border-left-color: var(--green);
            opacity: 0.75;
        }

        /* Checkbox */
        .task-checkbox {
            width: 26px;
            height: 26px;
            min-width: 26px;
            border-radius: 8px;
            border: 2.5px solid var(--border);
            background: var(--bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2px;
            transition: all 0.18s;
            font-size: 0.95rem;
        }

        .task-checkbox:hover { border-color: var(--accent); background: var(--accent-soft); }
        .task-checkbox.checked { background: var(--green); border-color: var(--green); color: #fff; }

        /* Text body */
        .task-body { flex: 1; min-width: 0; }

        .task-text {
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--ink);
            line-height: 1.5;
            word-break: break-word;
            transition: all 0.2s;
        }

        .task-done .task-text {
            text-decoration: line-through;
            color: var(--ink-mute);
        }

        .task-meta {
            margin-top: 0.3rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .priority-badge {
            font-size: 0.72rem;
            font-weight: 700;
            padding: 0.18rem 0.6rem;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .priority-badge.high   { background: rgba(224,82,82,0.12);  color: var(--red); }
        .priority-badge.medium { background: rgba(232,147,58,0.12); color: var(--orange); }
        .priority-badge.low    { background: rgba(72,169,122,0.12); color: var(--green); }

        .task-time {
            font-size: 0.75rem;
            color: var(--ink-mute);
            font-weight: 400;
        }

        /* Delete btn */
        .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--ink-mute);
            padding: 0.2rem;
            opacity: 0.3;
            transition: all 0.15s;
            border-radius: 6px;
            line-height: 1;
        }

        .task-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: var(--red); background: rgba(224,82,82,0.08); opacity: 1; }

        /* ────────────────────────────────
           EMPTY STATE
        ──────────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--ink-mute);
        }

        .empty-state .empty-icon {
            font-size: 3.5rem;
            margin-bottom: 0.8rem;
            display: block;
            opacity: 0.6;
        }

        .empty-state p {
            font-size: 1rem;
            font-weight: 500;
        }

        /* ────────────────────────────────
           DONE SECTION TOGGLE
        ──────────────────────────────── */
        .done-toggle {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--ink-mute);
            cursor: pointer;
            margin-top: 1.2rem;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            background: none;
            border: none;
            font-family: inherit;
            transition: color 0.15s;
        }

        .done-toggle:hover { color: var(--accent); }
        .done-toggle .arrow { transition: transform 0.2s; display: inline-block; }
        .done-toggle.open .arrow { transform: rotate(90deg); }

        /* ────────────────────────────────
           HOVER TIP
        ──────────────────────────────── */
        .tip {
            margin-top: 2rem;
            padding: 0.9rem 1.1rem;
            background: var(--accent-soft);
            border-radius: var(--radius-sm);
            border-left: 4px solid var(--accent);
            font-size: 0.88rem;
            color: #3a5a80;
            font-weight: 500;
        }

        /* ────────────────────────────────
           RESPONSIVE
        ──────────────────────────────── */
        @media (max-width: 500px) {
            body { padding: 1.5rem 0.75rem 4rem; }
            .page-header-left h1 { font-size: 1.7rem; }
            .add-row { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="wrapper">

    <!-- Header -->
    <div class="page-header">
        <div class="page-header-left">
            <h1>📋 My Tasks</h1>
            <p>Simple, clear, one step at a time.</p>
        </div>
        <a href="index.html" class="back-link">← NeuroVikas</a>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <span class="toolbar-label">Font:</span>
        <button class="pill-btn active" id="btn-lexend" onclick="setFont('lexend')">Lexend</button>
        <button class="pill-btn" id="btn-dyslexia" onclick="setFont('dyslexia')">OpenDyslexic</button>

        <div class="divider"></div>

        <span class="toolbar-label">Show:</span>
        <button class="pill-btn active" id="filter-all" onclick="setFilter('all')">All</button>
        <button class="pill-btn" id="filter-active" onclick="setFilter('active')">Active</button>
        <button class="pill-btn" id="filter-high" onclick="setFilter('high')">🔴 High</button>
    </div>

    <!-- Add Task -->
    <div class="add-card">
        <h2>➕ Add a New Task</h2>
        <div class="add-row">
            <input
                class="task-input"
                id="task-input"
                type="text"
                placeholder="What do you need to do?"
                maxlength="120"
                autocomplete="off"
                onkeydown="if(event.key==='Enter') addTask()"
            >
            <select class="priority-select" id="priority-select">
                <option value="medium">🟡 Normal</option>
                <option value="high">🔴 Urgent</option>
                <option value="low">🟢 Relaxed</option>
            </select>
            <button class="add-btn" onclick="addTask()">Add</button>
        </div>
    </div>

    <!-- Progress -->
    <div class="progress-section">
        <div class="progress-row">
            <span id="progress-label">0 of 0 done</span>
            <span id="progress-percent">0%</span>
        </div>
        <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
    </div>

    <!-- Active Tasks -->
    <p class="section-title">Active Tasks</p>
    <ul class="task-list" id="active-list">
        <li class="empty-state" id="empty-active">
            <span class="empty-icon">🌱</span>
            <p>No tasks yet — add one above!</p>
        </li>
    </ul>

    <!-- Completed Tasks (collapsible) -->
    <button class="done-toggle" id="done-toggle" onclick="toggleDone()">
        <span class="arrow">▶</span>
        Completed Tasks (<span id="done-count">0</span>)
    </button>
    <ul class="task-list" id="done-list" style="display:none; margin-top:0.7rem;">
        <li class="empty-state" id="empty-done" style="padding:1.5rem 1rem;">
            <p>Nothing finished yet.</p>
        </li>
    </ul>

    <!-- Tip -->
    <div class="tip">
        💡 <strong>Tip:</strong> Break big tasks into small steps. Finish one before starting the next.
    </div>

</div>

<script>
// ─────────────────────────────────
// STATE
// ─────────────────────────────────
let tasks = JSON.parse(localStorage.getItem('nv_todo') || '[]');
let filter = 'all';
let doneOpen = false;

// ─────────────────────────────────
// FONT SWITCHING
// ─────────────────────────────────
function setFont(f) {
    document.body.classList.toggle('font-dyslexia', f === 'dyslexia');
    document.getElementById('btn-lexend').classList.toggle('active', f !== 'dyslexia');
    document.getElementById('btn-dyslexia').classList.toggle('active', f === 'dyslexia');
    localStorage.setItem('nv_todo_font', f);
}

// Load saved font
(function() {
    const saved = localStorage.getItem('nv_todo_font');
    if (saved) setFont(saved);
})();

// ─────────────────────────────────
// FILTER
// ─────────────────────────────────
function setFilter(f) {
    filter = f;
    ['all','active','high'].forEach(id => {
        document.getElementById('filter-' + id).classList.remove('active');
    });
    document.getElementById('filter-' + f).classList.add('active');
    render();
}

// ─────────────────────────────────
// ADD TASK
// ─────────────────────────────────
function addTask() {
    const input = document.getElementById('task-input');
    const text = input.value.trim();
    if (!text) {
        input.focus();
        input.style.borderColor = '#e05252';
        setTimeout(() => input.style.borderColor = '', 800);
        return;
    }
    const priority = document.getElementById('priority-select').value;
    tasks.unshift({
        id: Date.now(),
        text,
        priority,
        done: false,
        created: new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })
    });
    input.value = '';
    input.focus();
    save();
    render();
}

// ─────────────────────────────────
// TOGGLE DONE
// ─────────────────────────────────
function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
}

// ─────────────────────────────────
// DELETE
// ─────────────────────────────────
function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
}

// ─────────────────────────────────
// DONE SECTION TOGGLE
// ─────────────────────────────────
function toggleDone() {
    doneOpen = !doneOpen;
    document.getElementById('done-list').style.display = doneOpen ? 'flex' : 'none';
    document.getElementById('done-toggle').classList.toggle('open', doneOpen);
}

// ─────────────────────────────────
// SAVE
// ─────────────────────────────────
function save() {
    localStorage.setItem('nv_todo', JSON.stringify(tasks));
}

// ─────────────────────────────────
// RENDER
// ─────────────────────────────────
function render() {
    const activeList = document.getElementById('active-list');
    const doneList   = document.getElementById('done-list');

    let activeTasks = tasks.filter(t => !t.done);
    let doneTasks   = tasks.filter(t => t.done);

    // Apply filter
    if (filter === 'active') activeTasks = activeTasks; // already filtered
    if (filter === 'high') activeTasks = activeTasks.filter(t => t.priority === 'high');

    // Render active
    if (activeTasks.length === 0) {
        activeList.innerHTML = `
            <li class="empty-state" id="empty-active">
                <span class="empty-icon">${filter === 'high' ? '✅' : '🌱'}</span>
                <p>${filter === 'high' ? 'No urgent tasks — you\'re on top of it!' : 'No active tasks.'}</p>
            </li>`;
    } else {
        activeList.innerHTML = activeTasks.map(t => taskHTML(t)).join('');
    }

    // Render done
    if (doneTasks.length === 0) {
        doneList.innerHTML = `<li class="empty-state" id="empty-done" style="padding:1.5rem 1rem;"><p>Nothing finished yet.</p></li>`;
    } else {
        doneList.innerHTML = doneTasks.map(t => taskHTML(t)).join('');
    }

    // Update done count
    document.getElementById('done-count').textContent = doneTasks.length;

    // Update progress
    const total = tasks.length;
    const done  = doneTasks.length;
    const pct   = total === 0 ? 0 : Math.round((done / total) * 100);
    document.getElementById('progress-label').textContent   = `${done} of ${total} done`;
    document.getElementById('progress-percent').textContent = pct + '%';
    document.getElementById('progress-fill').style.width   = pct + '%';
}

function taskHTML(t) {
    const priorityLabel = { high: '🔴 Urgent', medium: '🟡 Normal', low: '🟢 Relaxed' }[t.priority];
    return `
        <li class="task-item priority-${t.priority}${t.done ? ' task-done' : ''}">
            <div class="task-checkbox${t.done ? ' checked' : ''}"
                 role="checkbox"
                 aria-checked="${t.done}"
                 tabindex="0"
                 onclick="toggleTask(${t.id})"
                 onkeydown="if(event.key===' '||event.key==='Enter') toggleTask(${t.id})">
                ${t.done ? '✓' : ''}
            </div>
            <div class="task-body">
                <div class="task-text">${escapeHTML(t.text)}</div>
                <div class="task-meta">
                    <span class="priority-badge ${t.priority}">${priorityLabel}</span>
                    <span class="task-time">${t.created}</span>
                </div>
            </div>
            <button class="delete-btn"
                    onclick="deleteTask(${t.id})"
                    title="Delete task"
                    aria-label="Delete task">✕</button>
        </li>`;
}

function escapeHTML(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Initial render
render();
</script>

</body>
</html>
