<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | DIFFERENT IDEA</title>

    <!-- Styles -->
    <link rel="stylesheet" href="login.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Main Container -->
    <div class="login-container">

        <!-- Left Brand Panel -->
        <div class="brand-panel">
            <div class="brand-content">
                <h1>NeuroVikas</h1>
                <p id="typing-text"></p>
            </div>
        </div>

        <!-- Right Form Panel -->
        <div class="form-panel">
            <div class="form-wrapper">

                <h2>Create Account</h2>
                <p class="subtitle">Sign up to track your progress.</p>

                <!-- Signup Form -->
                <form id="signup-form">

                    <div class="input-group">
                        <label class="labels">Username</label>
                        <input 
                            type="text" 
                            id="su-username" 
                            placeholder="Choose a username" 
                            required>
                    </div>

                    <div class="input-group">
                        <label>Email Address</label>
                        <input 
                            type="email" 
                            id="su-email" 
                            placeholder="you@example.com" 
                            required>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input 
                            type="password" 
                            id="su-password" 
                            placeholder="Create a password" 
                            required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">
                        Sign Up
                    </button>

                </form>

                <!-- Divider -->
                <div class="divider">
                    <span>or</span>
                </div>

                <!-- Navigation Buttons -->
                <a href="login.html" class="btn btn-outline btn-full">
                    I already have an account
                </a>

                <br>

                <a href="index.html"
                   class="btn btn-outline btn-full"
                   style="background:#f5f5f5; color:#666; border-color:#ddd;">
                    Continue as Guest
                </a>

            </div>
        </div>

    </div>

<script>

/* ================================
   API URL DETECTION
================================ */

const getApiUrl = () => {

    // Local Development
    if (
        window.location.hostname === '127.0.0.1' ||
        window.location.hostname === 'localhost'
    ) {
        return "http://127.0.0.1:5000";
    }

    // GitHub Codespaces
    if (window.location.hostname.includes('app.github.dev')) {
        let host = window.location.hostname;
        return `https://${host.replace(/-\d+/, '-5000')}`;
    }

    // Default deployment
    return window.location.origin;
};

const API_URL = getApiUrl();


/* ================================
   SIGNUP FORM SUBMISSION
================================ */

document.getElementById('signup-form').addEventListener('submit', async (e) => {

    e.preventDefault();

    const username = document.getElementById('su-username').value;
    const email = document.getElementById('su-email').value;
    const password = document.getElementById('su-password').value;

    try {

        const res = await fetch(`${API_URL}/api/signup`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                username,
                email,
                password
            })
        });

        const data = await res.json();

        if (data.success) {
            alert(data.message + " Please login now.");
            window.location.href = "login.html";
        } 
        else {
            alert(data.message);
        }

    } 
    catch (err) {
        alert("Could not connect to server.");
    }

});


/* ================================
   TYPING EFFECT
================================ */

const text = "Begin your personalized learning journey today.";
let index = 0;

function typeEffect() {

    if (index < text.length) {

        document.getElementById("typing-text").innerHTML += text.charAt(index);

        index++;

        setTimeout(typeEffect, 40);
    }

}

window.onload = typeEffect;

</script>

</body>
</html>
