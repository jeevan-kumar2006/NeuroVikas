<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result | DIFFERENT IDEA</title>
    <!-- Reuse existing styles -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="result.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lexend:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Control Sidebar (Same as before) -->
    <nav class="control-panel">
        <div class="logo">DIFFERENT IDEA</div>
        <p class="tagline">Reading Mode</p>

        <div class="control-group">
            <h3>Profile Selection</h3>
            <div class="btn-group">
                <button onclick="setMode('default')" class="btn btn-outline" id="btn-default">Standard</button>
                <button onclick="setMode('dyslexia')" class="btn btn-outline" id="btn-dyslexia">Dyslexia Friendly</button>
                <button onclick="setMode('adhd')" class="btn btn-outline" id="btn-adhd">ADHD Focus</button>
            </div>
        </div>

        <div class="control-group">
            <h3>Reading Tools</h3>
            <label class="toggle-label">
                <span>Bionic Reading</span>
                <input type="checkbox" id="toggle-bionic" onchange="toggleBionic(this.checked)">
                <span class="slider"></span>
            </label>
            <label class="toggle-label">
                <span>Focus Mask</span>
                <input type="checkbox" id="toggle-focus" onchange="toggleFocusMask(this.checked)">
                <span class="slider"></span>
            </label>
        </div>

        <div class="control-group">
            <h3>Content View</h3>
            <select id="complexity-select" onchange="changeComplexity(this.value)">
                <option value="academic">Academic (Original)</option>
                <option value="simplified">Simplified (Easy Read)</option>
            </select>
        </div>

        <div class="control-group distress-section">
            <button class="btn btn-distress" onclick="triggerBreak()">
                😓 I'm overwhelmed
            </button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="content-area" id="content-area">
        
        <!-- Focus Mask -->
        <div class="focus-mask" id="focus-mask"></div>

        <!-- Top Action Bar -->
        <div class="top-bar">
            <a href="index.html" class="btn-back">← New Text</a>
            <a href="dashboard.html" class="btn-back" style="margin-left: 1rem;">← Dashboard</a>
        </div>

        <!-- Article Container -->
        <article class="article-container" id="article-container">
            <header>
                <h1 id="article-title">Processed Content</h1>
                <div class="meta-bar">
                    <span class="tag" id="meta-complexity">Analyzing...</span>
                    <span class="reading-time" id="meta-time">0 min read</span>
                </div>
            </header>

            <!-- Tools Bar -->
            <div class="action-bar">
                <button id="tts-btn" class="btn btn-icon" onclick="toggleSpeech()">🔊 Read Aloud</button>
                <button class="btn btn-icon" onclick="downloadText()">📥 Download TXT</button>
                <button class="btn btn-icon" onclick="downloadPDF()">📥 Download PDF</button>
            </div>

            <!-- Dynamic Content -->
            <section class="content-block" id="content-academic"></section>
            <section class="content-block hidden" id="content-simplified"></section>

            <!-- Visual Summary -->
            <aside class="visual-summary" id="visual-summary">
                <div class="card">
                    <div class="icon">💡</div>
                    <div class="text">Key Concepts</div>
                </div>
            </aside>
        </article>
    </main>

    <!-- Distress Modal -->
    <div class="modal-overlay hidden" id="distress-modal" onclick="closeBreak()">
        <!-- Added onclick stopPropagation so clicking INSIDE the box doesn't close it -->
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2>Let's take a breath.</h2>
            <p>Focus on the circle.</p>
            <div class="breathing-circle"></div>
            <button class="btn btn-primary" onclick="closeBreak()">I'm ready</button>
        </div>
    </div>

    <script src="result.js"></script>
</body>
</html>
